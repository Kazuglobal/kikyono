  </g>

  <g filter="url(#typeShadow)" font-family="Arial Black, Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-weight="900" transform="rotate(-3 360 125) skewX(-4)">
    <text x="68" y="151" font-size="86" fill="#251247" stroke="#251247" stroke-width="1.4">走れ、打て、</text>
    <text x="570" y="151" font-size="86" fill="#86ac00" stroke="#86ac00" stroke-width="1.4">笑え。</text>
