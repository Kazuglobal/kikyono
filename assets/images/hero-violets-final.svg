  <text x="84" y="215" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="25" font-weight="900" fill="#251247" stroke="#fff" stroke-width="1.5" paint-order="stroke">桔梗野バイオレッツで野球の楽しさを仲間と育てよう</text>

  <g transform="translate(80 248)">
    <rect width="284" height="64" rx="14" fill="#5a2d91" stroke="#3c166c" stroke-width="2"/>
