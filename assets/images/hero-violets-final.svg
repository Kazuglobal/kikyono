<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1247 374" role="img" aria-label="走れ、打て、笑え。桔梗野バイオレッツのヒーロー画像">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ccff1"/>
      <stop offset="0.44" stop-color="#d7edf8"/>
      <stop offset="0.45" stop-color="#568a43"/>
      <stop offset="0.62" stop-color="#89b36a"/>
      <stop offset="0.63" stop-color="#b87a49"/>
      <stop offset="1" stop-color="#8f5734"/>
    </linearGradient>
    <radialGradient id="ball" cx="33%" cy="25%" r="78%">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.42" stop-color="#e8dcc9"/>
      <stop offset="1" stop-color="#a98d71"/>
    </radialGradient>
    <filter id="blurCloud"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#251247" flood-opacity=".32"/>
    </filter>
    <filter id="typeShadow">
      <feDropShadow dx="4" dy="5" stdDeviation="0" flood-color="#ffffff" flood-opacity=".88"/>
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#251247" flood-opacity=".20"/>
    </filter>
    <pattern id="dirt" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 14 C4 12 8 15 12 11 C14 9 16 10 18 8" stroke="#6e3d22" stroke-opacity=".24" stroke-width="1" fill="none"/>
      <circle cx="5" cy="5" r="1.1" fill="#5d311a" opacity=".22"/>
      <circle cx="13" cy="15" r=".8" fill="#f4dfc8" opacity=".35"/>
    </pattern>
    <pattern id="grain" width="7" height="7" patternUnits="userSpaceOnUse">
      <path d="M0 7 7 0" stroke="#251247" stroke-opacity=".04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1247" height="374" fill="url(#sky)"/>
  <rect y="230" width="1247" height="144" fill="url(#dirt)" opacity=".9"/>
  <rect width="1247" height="374" fill="url(#grain)"/>

  <g filter="url(#blurCloud)" opacity=".92">
