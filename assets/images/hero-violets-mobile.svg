<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 270" role="img" aria-label="走れ、打て、笑え。桔梗野バイオレッツのスマホ用ヒーロー画像">
  <defs>
    <linearGradient id="skyMobile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ed3f4"/>
      <stop offset="0.42" stop-color="#d9eff9"/>
      <stop offset="0.43" stop-color="#477b36"/>
      <stop offset="0.62" stop-color="#81a95e"/>
      <stop offset="0.63" stop-color="#bd7b48"/>
      <stop offset="1" stop-color="#8f5734"/>
    </linearGradient>
    <radialGradient id="mobileBall" cx="35%" cy="24%" r="80%">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.45" stop-color="#e8dcc9"/>
      <stop offset="1" stop-color="#a98d71"/>
    </radialGradient>
    <filter id="mobileShadow">
      <feDropShadow dx="3" dy="4" stdDeviation="0" flood-color="#fff" flood-opacity=".9"/>
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#251247" flood-opacity=".24"/>
    </filter>
    <filter id="mobileLift" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#251247" flood-opacity=".3"/>
    </filter>
    <pattern id="mobileGrain" width="7" height="7" patternUnits="userSpaceOnUse">
      <path d="M0 7 7 0" stroke="#251247" stroke-opacity=".04" stroke-width="1"/>
    </pattern>
    <pattern id="mobileDirt" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 14 C4 12 8 15 12 11 C14 9 16 10 18 8" stroke="#6e3d22" stroke-opacity=".24" stroke-width="1" fill="none"/>
      <circle cx="5" cy="5" r="1.1" fill="#5d311a" opacity=".2"/>
      <circle cx="13" cy="15" r=".8" fill="#f4dfc8" opacity=".32"/>
    </pattern>
  </defs>

  <rect width="390" height="270" fill="url(#skyMobile)"/>
  <rect y="170" width="390" height="100" fill="url(#mobileDirt)" opacity=".92"/>
  <rect width="390" height="270" fill="url(#mobileGrain)"/>

  <g opacity=".85">
    <ellipse cx="78" cy="31" rx="47" ry="14" fill="#fff"/>
    <ellipse cx="128" cy="27" rx="52" ry="16" fill="#fff"/>
    <ellipse cx="244" cy="32" rx="62" ry="17" fill="#fff"/>
  </g>

  <g opacity=".35">
    <rect x="93" y="18" width="4" height="84" fill="#3d4250"/>
    <rect x="80" y="16" width="32" height="5" rx="3" fill="#3d4250"/>
    <rect x="300" y="16" width="4" height="95" fill="#3d4250"/>
    <rect x="286" y="14" width="35" height="5" rx="3" fill="#3d4250"/>
  </g>

  <path d="M0 132 C62 112 126 118 198 130 C282 144 327 124 390 112 L390 165 L0 165 Z" fill="#315b31" opacity=".58"/>
  <path d="M0 165 H390" stroke="#f0f7e8" stroke-width="3" opacity=".82"/>
  <path d="M-35 240 C48 206 134 193 234 185 C294 181 342 171 410 148" fill="none" stroke="#fff8ed" stroke-width="5" opacity=".95"/>
  <path d="M-20 201 C58 191 148 194 238 204 C312 212 352 200 414 180" fill="none" stroke="#fff8ed" stroke-width="4" opacity=".92"/>

  <g transform="translate(276 -10) skewX(-13)">
    <path d="M40 0 H250 L140 294 H-20 Z" fill="#fff" opacity=".92"/>
    <path d="M75 272 C140 215 202 184 278 155" fill="none" stroke="#251247" stroke-width="38" opacity=".94"/>
    <path d="M72 263 C142 210 206 174 282 148" fill="none" stroke="#65269a" stroke-width="14" opacity=".8"/>
  </g>

  <g filter="url(#mobileLift)" transform="translate(282 36)">
    <circle cx="70" cy="70" r="68" fill="url(#mobileBall)"/>
    <circle cx="70" cy="70" r="68" fill="none" stroke="#6d5137" stroke-opacity=".22" stroke-width="1.5"/>
    <g opacity=".13">
      <circle cx="70" cy="70" r="16" fill="none" stroke="#6f5439"/>
      <circle cx="70" cy="70" r="32" fill="none" stroke="#6f5439"/>
      <circle cx="70" cy="70" r="48" fill="none" stroke="#6f5439"/>
      <circle cx="70" cy="70" r="63" fill="none" stroke="#6f5439"/>
    </g>
    <path d="M33 12 C8 48 10 92 36 128" fill="none" stroke="#9b3035" stroke-width="5" stroke-dasharray="9 7" opacity=".82"/>
    <path d="M107 12 C132 48 130 92 104 128" fill="none" stroke="#9b3035" stroke-width="5" stroke-dasharray="9 7" opacity=".82"/>
    <text x="70" y="91" text-anchor="middle" font-family="Arial Black, Yu Gothic, sans-serif" font-size="52" fill="#5a2d91" opacity=".78" stroke="#5a2d91" stroke-width="2.5">V</text>
  </g>

  <g filter="url(#mobileShadow)" font-family="Arial Black, Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-weight="900" transform="rotate(-3 150 94) skewX(-4)">
    <text x="18" y="86" font-size="45" fill="#251247" stroke="#251247" stroke-width="1">走れ、打て、</text>
    <text x="25" y="132" font-size="54" fill="#86ac00" stroke="#86ac00" stroke-width="1">笑え。</text>
  </g>

  <text x="20" y="160" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="13.5" font-weight="900" fill="#251247" stroke="#fff" stroke-width="1" paint-order="stroke">桔梗野バイオレッツで野球の楽しさを仲間と育てよう</text>

  <g transform="translate(18 184)">
    <rect width="166" height="50" rx="11" fill="#5a2d91" stroke="#3c166c" stroke-width="2"/>
    <circle cx="32" cy="25" r="15" fill="none" stroke="#fff" stroke-width="1.8"/>
    <path d="M27 13 C19 21 21 34 30 38M38 13 C46 21 44 34 35 38" fill="none" stroke="#fff" stroke-width="1.8"/>
    <text x="58" y="31" fill="#fff" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="14.5" font-weight="900">体験入団する</text>
    <text x="143" y="33" fill="#fff" font-family="Arial, sans-serif" font-size="26">›</text>
  </g>

  <g transform="translate(199 184)">
    <rect width="164" height="50" rx="11" fill="#fff" stroke="#3c166c" stroke-width="2"/>
    <path d="M31 22 C40 17 50 20 56 28" fill="none" stroke="#251247" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M37 21 L33 31 H57 L53 24" fill="#251247"/>
    <text x="66" y="31" fill="#251247" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="14.5" font-weight="900">活動を見る</text>
    <text x="139" y="33" fill="#251247" font-family="Arial, sans-serif" font-size="26">›</text>
  </g>

  <path d="M0 252 C86 266 176 265 246 252 C300 243 346 242 390 236 L390 270 L0 270 Z" fill="#251247"/>
  <path d="M0 247 C92 263 180 261 252 249 C307 240 350 238 390 232" fill="none" stroke="#b6d600" stroke-width="4"/>
</svg>
