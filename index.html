<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桔梗野バイオレッツ少年野球チーム | 公式サイト</title>
  <meta name="description" content="青森県八戸市の少年野球チーム「桔梗野バイオレッツ」公式サイト。チーム紹介、練習スケジュール、試合結果、体験入団案内をご覧いただけます。">
  <meta name="keywords" content="桔梗野バイオレッツ, 少年野球, 八戸市, 学童野球, 体験入団, スケジュール">
  <meta property="og:type" content="website">
  <meta property="og:title" content="桔梗野バイオレッツ少年野球チーム | 公式サイト">
  <meta property="og:description" content="走れ、打て、笑え。青森県八戸市で活動する少年野球チーム、桔梗野バイオレッツの公式サイトです。">
  <meta property="og:image" content="assets/images/og-placeholder.svg">
  <meta property="og:locale" content="ja_JP">

  <style>
    :root {
      --font-sans: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      --font-display: "Arial Black", "Yu Gothic", system-ui, sans-serif;
      --ink: #171421;
      --muted: #665f72;
      --paper: #fbfaf4;
      --surface: #ffffff;
      --violet: #5a2d91;
      --violet-dark: #251247;
      --violet-soft: #eee6fb;
      --lime: #bedf42;
      --grass: #e7f1dd;
      --clay: #b66b3b;
      --line: rgba(37, 18, 71, 0.14);
      --shadow: 0 22px 60px rgba(37, 18, 71, 0.14);
      --container: min(1180px, calc(100vw - 40px));
      --header-height: 76px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 6%, rgba(190, 223, 66, 0.22), transparent 24rem),
        linear-gradient(180deg, #fffef8 0%, #f5f1e8 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.05;
      background-image: repeating-linear-gradient(45deg, #251247 0 1px, transparent 1px 7px);
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button, input, textarea { font: inherit; }

    .page-container {
      width: var(--container);
      margin: 0 auto;
    }

    .page-stage {
      opacity: 1;
      transition: opacity 420ms ease;
    }

    .page-stage--hidden {
      opacity: 0;
      pointer-events: none;
    }

    .site-header {
      position: fixed;
      inset: 14px 0 auto;
      z-index: 40;
      pointer-events: none;
    }

    .header-bar {
      min-height: var(--header-height);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 10px 14px 10px 18px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 48px rgba(28, 16, 54, 0.16);
      pointer-events: auto;
    }

    .brand-lockup {
      display: grid;
      gap: 1px;
      line-height: 1;
    }

    .brand-lockup__top {
      color: var(--violet);
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.12em;
    }

    .brand-lockup__main {
      font-family: var(--font-display);
      color: var(--violet-dark);
      font-size: clamp(1.5rem, 2vw, 2.25rem);
      letter-spacing: 0.02em;
    }

    .brand-lockup__sub {
      color: var(--muted);
      font-size: 0.58rem;
      font-weight: 800;
    }

    .desktop-nav {
      display: flex;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }

    .desktop-nav__link {
      display: grid;
      gap: 2px;
      padding: 10px 12px;
      border-radius: 12px;
      color: #332a46;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .desktop-nav__link span {
      font-size: 0.82rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .desktop-nav__link small {
      color: var(--muted);
      font-size: 0.55rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .desktop-nav__link:hover,
    .desktop-nav__link.is-active {
      background: var(--violet-dark);
      color: #fff;
      transform: translateY(-1px);
    }

    .desktop-nav__link:hover small,
    .desktop-nav__link.is-active small { color: var(--lime); }

    .header-cta,
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border-radius: 12px;
      font-weight: 900;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .header-cta,
    .button--primary {
      color: #fff;
      background: linear-gradient(135deg, var(--violet) 0%, var(--violet-dark) 100%);
      box-shadow: 0 14px 28px rgba(90, 45, 145, 0.24);
    }

    .button--light {
      color: var(--violet-dark);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .header-cta:hover,
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(90, 45, 145, 0.24);
    }

    .mobile-nav-toggle {
      display: none;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 12px;
      background: var(--violet-dark);
      padding: 12px;
    }

    .mobile-nav-toggle span {
      display: block;
      height: 2px;
      margin: 5px 0;
      background: #fff;
      border-radius: 99px;
    }

    .mobile-nav-panel {
      width: var(--container);
      margin: 10px auto 0;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .mobile-nav-panel__links {
      display: grid;
      gap: 8px;
    }

    .mobile-nav-panel__link {
      padding: 13px 14px;
      border-radius: 10px;
      font-weight: 900;
      background: #f4f0ec;
    }

    .hero-section {
      position: relative;
      min-height: 920px;
      overflow: hidden;
      color: #fff;
      background: var(--violet-dark);
    }

    .hero-section__photo,
    .hero-section__photo img,
    .hero-section__wash {
      position: absolute;
      inset: 0;
    }

    .hero-section__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: saturate(1.05) contrast(0.95);
    }

    .hero-section__wash {
      background:
        linear-gradient(90deg, rgba(22, 12, 40, 0.9) 0%, rgba(37, 18, 71, 0.65) 42%, rgba(37, 18, 71, 0.14) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0.74) 100%);
    }

    .hero-section__content {
      position: relative;
      min-height: 920px;
      display: grid;
      align-content: center;
      gap: 40px;
      padding: 132px 0 54px;
    }

    .hero-copy {
      max-width: 770px;
    }

    .section-kicker {
      margin: 0 0 14px;
      color: var(--violet);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.12em;
    }

    .hero-copy .section-kicker { color: var(--lime); }

    .hero-copy h1 {
      margin: 0;
      max-width: 940px;
      font-family: var(--font-display);
      font-size: clamp(4rem, 8.5vw, 8rem);
      line-height: 0.92;
      letter-spacing: 0;
      word-break: keep-all;
      text-wrap: balance;
      text-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .hero-copy p:not(.section-kicker) {
      max-width: 660px;
      margin: 24px 0 0;
      font-size: clamp(1rem, 1.5vw, 1.22rem);
      line-height: 1.9;
      font-weight: 700;
    }

    .hero-copy__actions,
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .hero-score {
      width: min(330px, 100%);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
      font-weight: 900;
      text-align: center;
    }

    .hero-score strong {
      color: var(--lime);
      font-size: 2.6rem;
      font-variant-numeric: tabular-nums;
    }

    .hero-digest {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-self: end;
      max-width: 900px;
    }

    .hero-digest article {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
    }

    .hero-digest span,
    .panel-label {
      color: var(--lime);
      font-size: 0.68rem;
      font-weight: 950;
      letter-spacing: 0.1em;
    }

    .hero-digest strong {
      display: block;
      margin-top: 6px;
      font-size: 1.15rem;
    }

    .hero-digest p {
      margin: 5px 0 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.86rem;
      line-height: 1.6;
    }

    .section {
      padding: 104px 0;
      position: relative;
    }

    .section--intro { padding-top: 90px; }

    .section--grass {
      background:
        linear-gradient(rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.86)),
        repeating-linear-gradient(90deg, rgba(46, 105, 55, 0.08) 0 54px, rgba(46, 105, 55, 0.14) 54px 108px);
    }

    .section--voices,
    .section--join {
      background: #f4f0ea;
    }

    .section-heading h2 {
      margin: 0;
      font-size: clamp(2.4rem, 5vw, 5.3rem);
      line-height: 1;
      letter-spacing: 0;
      font-family: var(--font-display);
      color: var(--violet-dark);
      text-wrap: balance;
    }

    .section-heading > p:not(.section-kicker) {
      max-width: 640px;
      margin: 22px 0 0;
      color: var(--muted);
      line-height: 2;
      font-weight: 700;
    }

    .section-heading--wide {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 34px;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 34px;
      align-items: stretch;
    }

    .diamond-card,
    .stat-tile,
    .value-card,
    .calendar-card,
    .week-panel,
    .score-card,
    .voice-card,
    .step-card,
    .gear-card,
    .site-footer__inner {
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.75);
    }

    .diamond-card {
      min-height: 280px;
      padding: 24px;
      display: grid;
      align-content: space-between;
      background: var(--violet-dark);
      color: #fff;
      overflow: hidden;
    }

    .diamond-card__field {
      width: 160px;
      height: 160px;
      margin: 8px auto;
      transform: rotate(45deg);
      border: 3px solid var(--lime);
      position: relative;
    }

    .diamond-card__field span {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 3px;
    }

    .diamond-card__field span:nth-child(1) { top: -10px; left: 70px; }
    .diamond-card__field span:nth-child(2) { right: -10px; top: 70px; }
    .diamond-card__field span:nth-child(3) { bottom: -10px; left: 70px; }
    .diamond-card__field span:nth-child(4) { left: -10px; top: 70px; }

    .diamond-card p {
      margin: 0;
      line-height: 1.8;
      font-weight: 800;
    }

    .stat-grid {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-tile {
      padding: 26px;
      position: relative;
      overflow: hidden;
    }

    .stat-tile::after,
    .score-card::before {
      content: "";
      position: absolute;
      inset: auto -40px -62px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 3px dashed rgba(90, 45, 145, 0.16);
    }

    .stat-tile span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .stat-tile strong {
      display: block;
      margin: 8px 0 6px;
      color: var(--violet-dark);
      font-size: 2.8rem;
      font-family: var(--font-display);
      line-height: 1;
    }

    .stat-tile p,
    .value-card p,
    .step-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-weight: 700;
    }

    .values-layout {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 36px;
      align-items: start;
    }

    .values-grid {
      display: grid;
      gap: 14px;
    }

    .value-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 18px;
      padding: 24px;
      box-shadow: none;
    }

    .value-card__number {
      grid-row: span 2;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: var(--violet-dark);
      background: var(--lime);
      font-family: var(--font-display);
      font-size: 1.4rem;
    }

    .value-card h3,
    .step-card h3,
    .gear-card h3 {
      margin: 0;
      font-size: 1.35rem;
      color: var(--violet-dark);
    }

    .schedule-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 22px;
      align-items: start;
    }

    .schedule-layout > .section-heading {
      grid-column: 1 / -1;
    }

    .calendar-card,
    .week-panel,
    .gear-card {
      padding: 24px;
    }

    .calendar-card__top,
    .calendar-week,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .calendar-card__top {
      grid-template-columns: 1fr auto;
      align-items: end;
      margin-bottom: 18px;
    }

    .calendar-card__top strong {
      font-family: var(--font-display);
      color: var(--violet-dark);
      font-size: 2.6rem;
    }

    .calendar-card__top span {
      color: var(--muted);
      font-weight: 900;
    }

    .calendar-week {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-align: center;
    }

    .calendar-day {
      min-height: 86px;
      padding: 10px;
      border-radius: 12px;
      background: #f5f2ec;
      border: 1px solid rgba(37, 18, 71, 0.08);
    }

    .calendar-day strong {
      display: block;
      font-variant-numeric: tabular-nums;
      color: var(--violet-dark);
    }

    .calendar-day span {
      display: inline-flex;
      margin-top: 12px;
      padding: 4px 7px;
      border-radius: 7px;
      color: #fff;
      background: var(--violet);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .calendar-day--game span { background: var(--clay); }
    .calendar-day--event span { color: var(--violet-dark); background: var(--lime); }

    .week-panel {
      display: grid;
      gap: 14px;
      background: var(--violet-dark);
      color: #fff;
    }

    .week-item {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
    }

    .week-item p {
      margin: 6px 0;
      font-weight: 800;
    }

    .week-item small { color: rgba(255, 255, 255, 0.72); }

    .results-layout {
      display: grid;
      gap: 26px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .score-card {
      position: relative;
      min-height: 250px;
      display: grid;
      align-content: space-between;
      padding: 22px;
      overflow: hidden;
      background: #191624;
      color: #fff;
      box-shadow: 0 22px 58px rgba(25, 22, 36, 0.2);
    }

    .score-card__date {
      width: max-content;
      padding: 6px 9px;
      border-radius: 8px;
      background: var(--lime);
      color: var(--violet-dark);
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .score-card span {
      color: var(--lime);
      font-size: 0.7rem;
      font-weight: 950;
      letter-spacing: 0.12em;
    }

    .score-card h3 {
      margin: 6px 0 0;
      font-size: 1.15rem;
    }

    .score-card > strong {
      font-family: var(--font-display);
      font-size: 3.4rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .score-card a {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--violet-dark);
      background: #fff;
      font-weight: 950;
    }

    .achievement-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .achievement-strip article {
      padding: 18px;
      border-radius: 14px;
      background: var(--violet-soft);
    }

    .achievement-strip span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .achievement-strip strong {
      display: block;
      margin-top: 6px;
      color: var(--violet-dark);
      font-size: 0.96rem;
    }

    .voice-layout {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 28px;
    }

    .voice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .voice-card {
      padding: 26px;
      min-height: 280px;
      display: grid;
      align-content: space-between;
    }

    .voice-card__badge {
      width: max-content;
      padding: 8px 10px;
      border-radius: 10px;
      background: var(--violet-dark);
      color: var(--lime);
      font-family: var(--font-display);
    }

    .voice-card p {
      margin: 20px 0;
      color: #3c344d;
      line-height: 1.95;
      font-weight: 700;
    }

    .voice-card strong { color: var(--violet); }

    .join-layout {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 22px;
      align-items: start;
    }

    .join-layout > .section-heading {
      position: sticky;
      top: 120px;
    }

    .badge-row span,
    .gear-card span {
      display: inline-flex;
      padding: 8px 10px;
      border-radius: 9px;
      background: var(--violet-soft);
      color: var(--violet-dark);
      font-weight: 900;
      font-size: 0.86rem;
    }

    .step-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .step-card {
      padding: 24px;
      min-height: 190px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .step-card span {
      color: var(--lime);
      font-family: var(--font-display);
      font-size: 2.4rem;
      -webkit-text-stroke: 1px var(--violet-dark);
    }

    .gear-card {
      grid-column: 2;
      display: grid;
      gap: 18px;
      background: var(--violet-dark);
      color: #fff;
    }

    .gear-card h3 { color: #fff; }

    .gear-card div {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .gallery-masonry {
      columns: 3 260px;
      column-gap: 14px;
    }

    .gallery-masonry img {
      width: 100%;
      margin: 0 0 14px;
      break-inside: avoid;
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .site-footer {
      padding: 92px 0 0;
      color: #fff;
      background: var(--violet-dark);
    }

    .site-footer__inner {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr;
      gap: 24px;
      padding: 28px;
      color: var(--ink);
      transform: translateY(-28px);
    }

    .site-footer__kicker,
    .site-footer__item-label {
      margin: 0;
      color: var(--violet);
      font-size: 0.75rem;
      font-weight: 950;
      letter-spacing: 0.1em;
    }

    .site-footer__logo {
      margin: 4px 0 10px;
      color: var(--violet-dark);
      font-family: var(--font-display);
      font-size: 3rem;
      line-height: 1;
    }

    .site-footer__copy,
    .site-footer__item {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-weight: 700;
    }

    .site-footer__meta {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .contact-form {
      display: grid;
      gap: 12px;
    }

    .contact-form label {
      display: grid;
      gap: 7px;

    .player-showcase {
      position: fixed;
      inset: 0;
      z-index: 998;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
      color: #fff;
      background:
        radial-gradient(circle at 78% 22%, rgba(190, 223, 66, 0.24), transparent 18rem),
        radial-gradient(circle at 18% 78%, rgba(0, 110, 185, 0.42), transparent 24rem),
        linear-gradient(135deg, #120924 0%, #281052 47%, #0d4b83 100%);
    }

    .player-showcase::before,
    .player-showcase::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .player-showcase::before {
      z-index: -2;
      opacity: 0.22;
      background:
        linear-gradient(90deg, transparent 0 48%, rgba(255, 255, 255, 0.22) 48% 49%, transparent 49%),
        repeating-linear-gradient(-24deg, rgba(255, 255, 255, 0.18) 0 2px, transparent 2px 28px);
    }

    .player-showcase::after {
      z-index: 1;
      opacity: 0.34;
      background:
        linear-gradient(110deg, transparent 0 35%, rgba(255, 255, 255, 0.48) 36%, transparent 43%),
        linear-gradient(110deg, transparent 0 58%, rgba(190, 223, 66, 0.5) 59%, transparent 64%);
      transform: translateX(-24%);
      animation: playerSpeedSweep 980ms ease-in-out infinite;
    }

    .player-showcase--closing {
      animation: playerShowcaseExit 460ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .player-showcase__field {
      position: absolute;
      right: -8vw;
      bottom: -18vh;
      z-index: -1;
      width: min(72vw, 900px);
      height: min(44vh, 360px);
      border: 2px solid rgba(255, 255, 255, 0.42);
      border-radius: 50% 50% 0 0;
      background:
        linear-gradient(180deg, rgba(190, 223, 66, 0.34), rgba(94, 45, 145, 0.1)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 1px, transparent 1px 54px);
      transform: rotate(-5deg);
      box-shadow: inset 0 0 0 14px rgba(255, 255, 255, 0.08);
    }

    .player-showcase__copy {
      position: absolute;
      left: clamp(24px, 5vw, 72px);
      top: clamp(92px, 15vh, 132px);
      z-index: 5;
      width: min(330px, calc(36vw - 28px));
      padding: 16px 18px 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      background: linear-gradient(105deg, rgba(18, 9, 36, 0.72), rgba(18, 9, 36, 0.16));
      backdrop-filter: blur(10px);
      text-shadow: 0 12px 34px rgba(0, 0, 0, 0.34);
    }

    .player-showcase__copy p {
      margin: 0 0 6px;
      color: var(--lime);
      font-size: clamp(0.66rem, 0.82vw, 0.82rem);
      font-weight: 950;
      letter-spacing: 0;

    .player-showcase__copy h2 {
      margin: 0;
      max-width: 100%;
      font-family: var(--font-display);
      font-size: clamp(2.1rem, 3.6vw, 4rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .player-showcase__copy strong {
      display: inline-grid;
      margin-top: 12px;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--violet-dark);
      background: var(--lime);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22);
      font-size: 0.92rem;
    }

    .player-showcase__number {
      position: absolute;
      right: clamp(24px, 8vw, 128px);
      top: clamp(90px, 16vh, 150px);
      z-index: 2;
      font-family: var(--font-display);
      font-size: clamp(7rem, 22vw, 18rem);
      line-height: 0.8;
      color: rgba(255, 255, 255, 0.1);
      -webkit-text-stroke: 2px rgba(255, 255, 255, 0.36);
      text-shadow: 0 34px 70px rgba(0, 0, 0, 0.32);
    }

    .player-showcase__player {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: end center;
      margin: 0;
      pointer-events: none;
    }

    .player-showcase__player img {
      width: auto;
      height: min(78vh, 780px);
      max-width: min(56vw, 620px);
      object-fit: contain;
      object-position: center bottom;
      transform-origin: 50% 100%;
      filter:
        drop-shadow(0 34px 38px rgba(0, 0, 0, 0.45))
        drop-shadow(0 0 22px rgba(190, 223, 66, 0.18))
        saturate(1.06)
        contrast(1.04);
      animation: playerCardIn 980ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .player-showcase__player--right img {
      animation-name: playerCardInRight;
    }

    .player-showcase__player figcaption {
      position: absolute;
      right: clamp(24px, 8vw, 128px);
      bottom: clamp(86px, 14vh, 132px);
      display: grid;
      gap: 2px;
      min-width: 126px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 12px;
      background: rgba(18, 9, 36, 0.64);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
    }

    .player-showcase__player figcaption span,
    .player-showcase__player figcaption strong {
      letter-spacing: 0;
    }

    .player-showcase__player figcaption span {
      color: var(--lime);
      font-size: 0.78rem;
      font-weight: 950;
    }

    .player-showcase__player figcaption strong {
      font-family: var(--font-display);
      font-size: 1.45rem;
    }

    .player-showcase__progress {
      position: absolute;
      left: 50%;
      bottom: 28px;
      z-index: 6;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
      list-style: none;
      transform: translateX(-50%);
    }

    .player-showcase__progress li {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
      transition: width 220ms ease, background 220ms ease;
    }

    .player-showcase__progress li.is-active {
      width: 34px;
      background: var(--lime);
    }

    .player-showcase__skip,
    .audio-retry {
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: rgba(18, 9, 36, 0.78);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.24);
      cursor: pointer;
    }

    .player-showcase__skip {
      position: absolute;
      right: 22px;
      top: 22px;
      z-index: 7;
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(12px);
      font-weight: 900;
    }

    .audio-retry {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 70;
      padding: 13px 18px;
      font-weight: 950;
      background: linear-gradient(135deg, var(--violet), var(--violet-dark));
    }

    @keyframes playerCardIn {
      0% {
        opacity: 0;
        transform: translate3d(-22vw, 4vh, 0) rotate(-8deg) scale(0.78);
        filter: blur(8px) drop-shadow(0 34px 38px rgba(0, 0, 0, 0.45));
      }
      18% { opacity: 1; }
      54% {
        transform: translate3d(2vw, -1vh, 0) rotate(2deg) scale(1.05);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      }
    }

    @keyframes playerCardInRight {
      0% {
        opacity: 0;
        transform: translate3d(22vw, 4vh, 0) rotate(8deg) scale(0.78);
        filter: blur(8px) drop-shadow(0 34px 38px rgba(0, 0, 0, 0.45));
      }
      18% { opacity: 1; }
      54% {
        transform: translate3d(-2vw, -1vh, 0) rotate(-2deg) scale(1.05);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      }
    }

    @keyframes playerSpeedSweep {
      0% { transform: translateX(-42%) skewX(-12deg); }
      100% { transform: translateX(42%) skewX(-12deg); }
    }

    @keyframes playerShowcaseExit {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(1.04);
      }
    }
