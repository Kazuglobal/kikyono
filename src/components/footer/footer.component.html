<footer id="contact" class="site-footer">
  <section class="contact-section">
    <div class="page-container">
      <header class="contact-heading">
        <h2>お問い合わせ</h2>
        <p>お気軽にお問い合わせください</p>
      </header>

      <iframe
        name="gas-submit-frame"
        title="gas-submit-frame"
        hidden
        tabindex="-1"
        (load)="handleSubmissionFrameLoad()"></iframe>

      <div class="contact-layout">
        <form
          class="contact-form"
          aria-label="お問い合わせフォーム"
          [attr.action]="gasEndpoint"
          method="post"
          target="gas-submit-frame"
          accept-charset="UTF-8"
          (submit)="handleContactSubmit($event)">
          <input type="hidden" name="siteName" value="桔梗野バイオレッツ少年野球チーム" />
          <input type="hidden" name="requestId" [value]="requestId()" />
          <input type="hidden" name="submittedAt" [value]="submittedAt()" />
          <label><span>保護者のお名前</span><input type="text" name="guardianName" autocomplete="name" placeholder="例）山田 太郎" required /></label>
          <label><span>お子さまのお名前</span><input type="text" name="childName" placeholder="例）山田 一郎" /></label>
          <label><span>学年</span><select name="grade" required>
            <option value="">選択してください</option>
            <option value="年長">年長</option>
            <option value="1年生">1年生</option>
            <option value="2年生">2年生</option>
            <option value="3年生">3年生</option>
            <option value="4年生">4年生</option>
            <option value="5年生">5年生</option>
            <option value="6年生">6年生</option>
          </select></label>
          <label><span>メールアドレス</span><input type="email" name="email" autocomplete="email" placeholder="例）kikyo@example.com" required /></label>
          <label><span>電話番号</span><input type="tel" name="phone" autocomplete="tel" placeholder="例）090-1234-5678" /></label>
          <label><span>希望内容</span><select name="inquiryType" required>
            <option value="">選択してください</option>
            <option value="体験希望">体験希望</option>
            <option value="見学希望">見学希望</option>
            <option value="入団相談">入団相談</option>
            <option value="練習試合の相談">練習試合の相談</option>
            <option value="その他">その他</option>
          </select></label>
          <label><span>希望参加日</span><input type="text" name="preferredDate" placeholder="例）5月10日、土日希望など" /></label>
          <label><span>野球経験</span><select name="baseballExperience">
            <option value="">選択してください</option>
            <option value="初めて">初めて</option>
            <option value="キャッチボール程度">キャッチボール程度</option>
            <option value="チーム経験あり">チーム経験あり</option>
          </select></label>
          <label class="contact-form__message"><span>お問い合わせ内容</span><textarea name="message" rows="5" placeholder="体験希望日、質問、不安なことなどをご入力ください"></textarea></label>
          <label class="contact-form__checkbox"><input type="checkbox" name="consent" value="同意済み" required /><span>送信内容を確認し、連絡を受け取ることに同意します</span></label>
          <button type="submit" class="button button--primary" [disabled]="submissionStatus() === 'submitting'">
            {{ submissionStatus() === 'submitting' ? '送信中...' : '送信する　✈' }}
          </button>
          @if (submissionMessage()) {
          <p class="contact-form__status" [class.is-success]="submissionStatus() === 'success'" [class.is-error]="submissionStatus() === 'error'">{{ submissionMessage() }}</p>
          }
        </form>

        <aside class="contact-info-card">
          <h3>活動場所</h3>
          <strong>桔梗野小学校グラウンド</strong>
          <p><a href="https://www.google.com/maps/search/?api=1&query=%E5%85%AB%E6%88%B8%E5%B8%82%E7%AB%8B%E6%A1%94%E6%A2%97%E9%87%8E%E5%B0%8F%E5%AD%A6%E6%A0%A1" target="_blank" rel="noopener noreferrer">Googleマップで場所を見る</a></p>
          <iframe
            class="map-card"
            [src]="mapEmbedUrl"
            title="八戸市立桔梗野小学校の地図"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </aside>
      </div>
    </div>
  </section>

  <section class="footer-black">
    <div class="page-container footer-black__inner">
      <div class="footer-brand">
        <strong>Violets</strong>
        <span>BASEBALL TEAM</span>
        <p>桔梗野バイオレッツ少年野球チーム</p>
        <p>野球を通じて、心と体を育て、仲間と共に成長する喜びを大切にしています。</p>
      </div>

      <nav aria-label="フッターメニュー">
        <h3>メニュー</h3>
        <a href="#home">ホーム</a>
        <a href="#about">チーム紹介</a>
        <a href="#achievements">大会実績</a>
      </nav>

      <nav aria-label="フッターメニュー2">
        <h3>&nbsp;</h3>
        <a href="#schedule">スケジュール</a>
        <a href="#join">入団案内</a>
        <a href="#contact">お問い合わせ</a>
      </nav>

    </div>
    <div class="site-footer__bottom">© {{ currentYear }} KIKYONO VIOLETS BASEBALL TEAM</div>
  </section>
</footer>
