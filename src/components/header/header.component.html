<div class="page-container header-bar">
  <a href="#home" class="brand-lockup" aria-label="桔梗野バイオレッツ ホーム">
    <span class="brand-lockup__script">
      <small>KIKYONO</small>
      Violets
      <em>BASEBALL TEAM</em>
    </span>
    <span class="brand-lockup__divider"></span>
    <span class="brand-lockup__jp">
      <strong>桔梗野バイオレッツ</strong>
      <small>少年野球チーム</small>
    </span>
  </a>

  <nav class="desktop-nav" aria-label="メインナビゲーション">
    @for (link of navLinks; track link.path) {
    <a
      [href]="link.path"
      class="desktop-nav__link"
      [class.is-active]="isActive(link.path)"
    >
      <span>{{ link.label }}</span>
      <small>{{ link.sublabel }}</small>
    </a>
    }
  </nav>

  <a href="#join" class="header-cta">体験入団する</a>

  <button
    type="button"
    class="mobile-nav-toggle"
    (click)="toggleMobileMenu()"
    [attr.aria-expanded]="isMobileMenuOpen()"
    aria-label="メニューを開く"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>
</div>

@if (isMobileMenuOpen()) {
<div class="mobile-nav-panel">
  <nav class="mobile-nav-panel__links" aria-label="モバイルナビゲーション">
    @for (link of navLinks; track link.path) {
    <a
      [href]="link.path"
      class="mobile-nav-panel__link"
      [class.is-active]="isActive(link.path)"
      (click)="closeMobileMenu()"
    >
      {{ link.label }}
    </a>
    }

    <a href="#join" class="header-cta header-cta--mobile" (click)="closeMobileMenu()">
      体験入団する
    </a>
  </nav>
</div>
}
