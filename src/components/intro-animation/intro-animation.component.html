<div
  class="intro-overlay"
  [class.intro-overlay--accent]="phase() === 'accent'"
  [class.intro-overlay--out]="phase() === 'out' || !isVisible()"
>
  <div class="intro-overlay__grain"></div>
  <div class="intro-overlay__streak"></div>

  <div class="intro-overlay__content">
    <p class="intro-overlay__top">KIKYONO</p>
    <h1 class="intro-overlay__logo">VIOLETS</h1>
    <p class="intro-overlay__sub">一球に想いを込めて。</p>
    <div class="intro-overlay__ball">
      <span aria-hidden="true">⚾</span>
    </div>
  </div>
</div>
